<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #08080c;
            --accent-glow: rgba(0, 136, 204, 0.3);
            --accent-telegram: #0088cc;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background glows */
        .bg-glows {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.15;
            mix-blend-mode: screen;
        }

        .orb-1 {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--accent-telegram) 0%, transparent 70%);
            top: 20%;
            left: 20%;
        }

        /* Loading Container */
        .loading-container {
            text-align: center;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            z-index: 2;
        }

        .spinner-box {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 28px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top-color: var(--accent-telegram);
            animation: spin 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
        }

        .spinner-inner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.02);
            border-radius: 50%;
            border-bottom-color: #a855f7;
            animation: spinReverse 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        .logo-icon {
            position: absolute;
            width: 24px;
            height: 24px;
            color: var(--accent-telegram);
            filter: drop-shadow(0 0 8px rgba(0, 136, 204, 0.6));
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes spinReverse {
            to { transform: rotate(-360deg); }
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 50%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="bg-glows">
        <div class="glow-orb orb-1"></div>
    </div>

    <div class="loading-container">
        <div class="spinner-box">
            <div class="spinner"></div>
            <div class="spinner-inner"></div>
            <!-- Custom SVG Telegram Icon in the middle -->
            <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15.82-.71 4.13-1 5.72-.12.67-.37.89-.61.91-.52.05-.91-.34-1.42-.67-.79-.52-1.24-.84-2-1.35-.88-.58-.31-.9.19-1.42.13-.14 2.39-2.19 2.43-2.36.01-.02.01-.11-.04-.16-.05-.05-.12-.03-.18-.02-.07.02-1.29.82-3.64 2.41-.34.24-.65.35-.93.34-.31-.01-.9-.18-1.34-.32-.54-.18-.97-.27-.93-.57.02-.16.24-.32.66-.49 2.58-1.12 4.31-1.87 5.17-2.22 2.47-.99 2.98-1.16 3.31-1.17.07 0 .24.02.35.1.09.07.12.17.13.26 0 .09-.01.27-.02.37z"/>
            </svg>
        </div>
        <h2>Verificando conexão segura...</h2>
        <p>Aguarde um instante enquanto redirecionamos você ao Grupo.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const encodedUrl = 'aHR0cHM6Ly90Lm1lL2dpdXJvc2FfYm90';
            
            setTimeout(() => {
                try {
                    const targetUrl = atob(encodedUrl);
                    window.location.replace(targetUrl);
                } catch (e) {
                    console.error("Redirection error", e);
                }
            }, 1000); // 1 second timeout
        });
    </script>
</body>
</html>
